name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout PR branch (handles forks)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          # Check if PR is from a fork
          IS_FORK=$(gh pr view $PR_NUMBER --repo "$REPO" --json isCrossRepository -q .isCrossRepository)
          if [ "$IS_FORK" = "true" ]; then
            # Replace origin URL with fork URL so action can fetch the branch
            FORK_URL=$(gh pr view $PR_NUMBER --repo "$REPO" --json headRepositoryOwner,headRepository -q '"https://github.com/\(.headRepositoryOwner.login)/\(.headRepository.name).git"')
            git remote set-url origin "$FORK_URL"
          fi
          gh pr checkout $PR_NUMBER --repo "$REPO"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pre-commit requests websocket-client
          pre-commit install

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        env:
          SERVICE_URL: ${{ secrets.LEETGPU_SERVICE_URL }}
          LEETGPU_API_KEY: ${{ secrets.LEETGPU_API_KEY }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude[bot]"

          settings: |
            {
              "permissions": {
                "allow": ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "WebFetch", "WebSearch", "Task"]
              }
            }

          prompt: |
            Review this PR for the LeetGPU challenges repository. Read CLAUDE.md first, then follow these steps:

            STEP 1 — Structural checklist:
            Read every changed file and verify against CLAUDE.md. Check each item:
            challenge.html:
            - [ ] Starts with <p> (problem description), no <h1> tags
            - [ ] Has <h2> sections: Implementation Requirements, Example(s), Constraints
            - [ ] Examples use correct format (<pre> for 1D, LaTeX bmatrix for matrices — not mixed)
            - [ ] Constraints has "Performance is measured with" bullet with exact values from generate_performance_test
            challenge.py:
            - [ ] Inherits ChallengeBase, __init__ calls super().__init__()
            - [ ] reference_impl has assertions on shape, dtype, device
            - [ ] 12-15 functional tests covering edges, powers-of-2, non-powers, realistic sizes, zeros, negatives
            - [ ] Performance test fits 5x in 16GB VRAM
            Starters:
            - [ ] All 6 files present (.cu, .pytorch.py, .triton.py, .jax.py, .cute.py, .mojo)
            - [ ] Exactly 1 parameter description comment per file, no other comments
            - [ ] CUDA/Mojo: "device pointers", Python: "tensors on the GPU" (see CLAUDE.md "Parameter Description Comment")

            STEP 2 — Content review:
            - Is the problem description clear and unambiguous?
            - Is the difficulty rating appropriate?
            - Are the test cases comprehensive (zeros, negatives, mixed values)?
            - Are the examples correct and matching the reference implementation?
            - Check the "Common Mistakes" section in CLAUDE.md — does this PR have any of them?

            STEP 3 — Live validation:
            Write a correct CUDA solution and run:
            ```
            python scripts/run_challenge.py <challenge_dir> --language cuda --action run
            ```
            Verify all functional tests pass and the performance test completes.
            Do NOT commit the solution file.

            Be constructive and specific in feedback. Reference exact file paths and line numbers.
