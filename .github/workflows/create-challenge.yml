name: Challenge Creation Cron

on:
  schedule:
    - cron: "0 9 * * *" # Every day at 9 AM UTC
  workflow_dispatch: {} # Allow manual trigger

jobs:
  create-challenge:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pre-commit requests websocket-client
          pre-commit install

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          SERVICE_URL: ${{ secrets.LEETGPU_SERVICE_URL }}
          LEETGPU_API_KEY: ${{ secrets.LEETGPU_API_KEY }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          claude_args: "--model claude-sonnet-4-6"

          settings: |
            {
              "permissions": {
                "allow": ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "WebFetch", "WebSearch", "Task"]
              }
            }

          prompt: |
            Read CLAUDE.md and follow the Creation Workflow to create and validate (with `run_challenge.py`) a new LeetGPU coding challenge, then open a PR.

            Before writing any code, think hard about what would make a genuinely interesting GPU programming challenge. List existing challenges (ls challenges/*/), study what's already covered, and brainstorm problems that would teach people something new about GPU programming.

            HARD RULES:
            - Do NOT create trivial element-wise challenges. We have way too many (sigmoid, relu, silu, clipping, etc). If your idea is just "apply f(x) to every element", pick something else.
            - Do NOT duplicate existing challenges.
            - Prefer medium or hard difficulty. Only create easy if the topic involves a non-trivial GPU concept (not just a map operation).
            - The challenge should require the solver to think about memory access patterns, synchronization, work distribution, or algorithm design — not just write a one-line kernel.

            STRUCTURAL REQUIREMENTS — verify each item before opening the PR:
            1. challenge.html starts with <p>, uses <h2> for sections (never <h1>), has Implementation Requirements / Example(s) / Constraints sections
            2. Constraints section includes "Performance is measured with <code>param</code> = value" bullet
            3. Examples use <pre> for 1D data, LaTeX \begin{bmatrix} for matrices — never mix formats
            4. challenge.py inherits ChallengeBase, has all 6 methods (__init__, reference_impl, get_solve_signature, generate_example_test, generate_functional_test, generate_performance_test)
            5. __init__ calls super().__init__() with name, atol, rtol, num_gpus, access_tier
            6. reference_impl has assertions on shape, dtype (torch.float32), and device (cuda)
            7. generate_functional_test returns 12-15 test cases covering: edge cases (1-4 elements), powers-of-2, non-powers-of-2, realistic sizes, zeros, negatives
            8. generate_performance_test fits 5x in 16GB VRAM
            9. All 6 starter files present: .cu, .pytorch.py, .triton.py, .jax.py, .cute.py, .mojo
            10. Each starter has exactly 1 parameter description comment, no other comments
            11. CUDA/Mojo starters: "// <params> are device pointers" or "# <params> are device pointers" (no parenthetical)
            12. Python starters: "# <params> are tensors on the GPU"; JAX also has "# return output tensor directly"

            VALIDATION — run before opening the PR:
            ```
            pre-commit run --all-files
            ```
